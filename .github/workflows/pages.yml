name: Deploy feed to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'feed.json'
      - 'schema/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # validate.yml runs in parallel on the same push, so a malformed feed.json
      # could otherwise reach Pages before validation fails. Re-running the
      # validator inline closes that race.
      - name: Install deps and validate feed
        run: |
          npm ci
          npm run validate
      - name: Prepare artifact
        run: |
          mkdir -p _site
          cp feed.json _site/
          cp -r schema _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
