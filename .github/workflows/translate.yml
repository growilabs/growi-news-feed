name: Translate feed.json

on:
  pull_request:
    paths:
      - 'feed.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    # Skip for PRs from forks (secrets unavailable there)
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run translation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run translate
      # GITHUB_TOKEN-driven pushes do NOT re-trigger workflows, so validate.yml
      # will not re-run on the bot's translation commit. Validate inline before
      # pushing to guarantee the spec rule "all locales present after merge".
      - name: Re-validate after translation
        run: npm run validate
      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain feed.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add feed.json
            git commit -m "chore: auto-translate missing locales in feed.json"
            git push
          else
            echo "No translation changes"
          fi
